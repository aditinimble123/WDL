<!DOCTYPE html>
<html>
<head>
    <title>Web Page with Image, Hyperlink, and Nested Table</title>
</head>
<body>

    <h1 align="center">Student Information Page</h1>

    <!-- Image -->
    <h2>College Logo</h2>
    <img src="https://th.bing.com/th/id/R.9c358c76e28d0bbab0b44c53a66b15c4?rik=9KupDHnbHUwVnA&riu=http%3a%2f%2fpcet.org.in%2fimages%2fnmiet-slider-img-1.png&ehk=HvxDwL%2b6OBWagbGTlF2K0iAP2om7LRjuaSty7OnkZUU%3d&risl=&pid=ImgRaw&r=0"
         alt="Nmiet Talegaon"
         width="200"
         height="200">

    <br><br>

    <!-- Hyperlink -->
    <h2>Visit Website</h2>
    <a href="https://www.nmiet.edu.in/" target="_blank">
        Click Here to Open Nmiet 
    </a>

    <br><br>

    <!-- Main Table -->
    <h2>Student Details</h2>

    <table border="1" cellpadding="10" cellspacing="0">

        <tr>
            <th>Name</th>
            <th>Department</th>
            <th>Marks</th>
        </tr>

        <tr>
            <td>Aditi</td>
            <td>Computer Engineering</td>

            <!-- Nested Table -->
            <td>
                <table border="1" cellpadding="5">
                    <tr>
                        <th>Subject</th>
                        <th>Marks</th>
                    </tr>

                    <tr>
                        <td>HTML</td>
                        <td>85</td>
                    </tr>

                    <tr>
                        <td>CSS</td>
                        <td>90</td>
                    </tr>

                    <tr>
                        <td>JavaScript</td>
                        <td>88</td>
                    </tr>
                </table>
            </td>
        </tr>

    </table>

</body>
</html>
