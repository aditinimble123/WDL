<!DOCTYPE html>
<html>
<head>
    <title>CSS Example</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Internal CSS -->
    <style>
        h2 {
            color: darkblue;
            text-align: center;
        }

        table {
            width: 60%;
            border-collapse: collapse;
            margin: auto;
        }

        th {
            background-color: lightblue;
            color: black;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>

<body>

    <!-- Inline CSS -->
    <h1 style="color:red; text-align:center;">
        Student Information
    </h1>

    <h2>Student Marks Table</h2>

    <table>
        <tr>
            <th>Name</th>
            <th>Subject</th>
            <th>Marks</th>
        </tr>

        <tr>
            <td>Aditi</td>
            <td>HTML</td>
            <td>85</td>
        </tr>

        <tr>
            <td>Rahul</td>
            <td>CSS</td>
            <td>90</td>
        </tr>

        <tr>
            <td>Priya</td>
            <td>JavaScript</td>
            <td>88</td>
        </tr>
    </table>

</body>
</html>
