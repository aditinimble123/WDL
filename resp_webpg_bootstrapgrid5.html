<!DOCTYPE html>
<html>
<head>
    <title>Simple Bootstrap Page</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- Heading -->
    <div class="container text-center mt-4">
        <h1 class="text-primary">My Bootstrap Web Page</h1>
        <p>Simple Responsive Design</p>
    </div>

    <!-- Bootstrap Grid -->
    <div class="container mt-4">
        <div class="row">

            <div class="col-md-4">
                <div class="card p-3">
                    <h3>HTML</h3>
                    <p>HTML creates web page structure.</p>
                    <button class="btn btn-primary">Read More</button>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3">
                    <h3>CSS</h3>
                    <p>CSS styles the web page.</p>
                    <button class="btn btn-success">Read More</button>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3">
                    <h3>Bootstrap</h3>
                    <p>Bootstrap makes pages responsive.</p>
                    <button class="btn btn-danger">Read More</button>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
